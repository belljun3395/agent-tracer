# 실행 프로파일: local | prd (env MONITOR_PROFILE 로 오버라이드).
profile: local

monitor:
  protocol: http
  # 기본은 loopback. 컨테이너/노출 배포는 MONITOR_LISTEN_HOST=0.0.0.0.
  listenHost: 127.0.0.1
  publicHost: 127.0.0.1
  port: 3847

# 주 저장소.
postgres:
  host: 127.0.0.1
  port: 5432
  username: monitor
  password: monitor
  database: monitor

# WS pub/sub 및 휘발성 공유 상태.
redis:
  url: redis://127.0.0.1:6379

web:
  apiBaseUrl: ""
  wsBaseUrl: ""

externalSetup:
  monitorBaseUrl: ""
  sourceRepo: belljun3395/agent-tracer
