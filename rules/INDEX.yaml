version: 1
rules:
  - id: mcp-protocol
    title: MCP Protocol
    description: Model Context Protocol usage — tool calls, resource access, and server connections across any runtime.
    lane: coordination
    keywords:
      - modelcontextprotocol
      - mcp server
      - mcp client
      - tools/call
      - tools/list
      - resources/list
      - resources/read
      - prompts/get
    tags:
      - mcp
      - coordination

  - id: claude-runtime
    title: Claude Runtime
    description: Claude hook scripts, settings, and runtime-specific integration paths.
    keywords:
      - claude-hook
      - userpromptsubmit
      - .claude/hooks/
      - user_prompt.ts
      - ensure_task.ts
      - session_end.ts
      - agent_activity.ts
      - .claude/settings.json
    tags:
      - claude
      - hooks
      - runtime

  - id: codex-runtime
    title: Codex Runtime
    description: Codex skill-based integration paths and native discovery files.
    keywords:
      - codex-skill
      - codex-monitor
      - .agents/skills/
      - agents.md
      - /codex/
    tags:
      - codex
      - runtime
      - skills

  - id: opencode-runtime
    title: OpenCode Runtime
    description: OpenCode plugin/runtime integration and Oh My Opencode envelopes.
    keywords:
      - opencode-plugin
      - opencode-sse
      - .opencode/plugins/monitor.ts
      - chat.message
      - tool.execute.after
      - session.created
      - session.deleted
      - oh-my-opencode
    tags:
      - opencode
      - runtime
      - plugin

  - id: background-lifecycle
    title: Background Lifecycle
    description: Runtime-specific background task lifecycle markers and tool names.
    lane: background
    keywords:
      - run_in_background
      - background_output
      - prompt_async
      - async_task_
      - asyncstatus
      - asynctaskid
    tags:
      - background
      - async
      - lifecycle

  - id: coordination-surface
    title: Coordination Surface
    description: Skill use, MCP calls, delegation, handoff, and task-link activity.
    lane: coordination
    keywords:
      - monitor_task_link
      - monitor_agent_activity
      - codex-monitor
      - delegation
      - handoff
      - subagent
      - skill_use
      - monitor-server
    tags:
      - coordination
      - orchestration

  - id: version-control
    title: Version Control
    description: Git operations — commits, branches, merges, and pull requests.
    keywords:
      - "git commit"
      - "git push"
      - "git pull"
      - "git merge"
      - "git branch"
      - "git rebase"
      - "git stash"
      - "pull request"
    tags:
      - git
      - vcs

  - id: package-management
    title: Package Management
    description: Dependency installs and updates across ecosystems.
    keywords:
      - "npm install"
      - "npm ci"
      - "pnpm install"
      - "pnpm add"
      - "yarn install"
      - "yarn add"
      - "pip install"
      - "pip freeze"
      - "uv add"
      - "uv sync"
      - "poetry install"
      - "poetry add"
      - "cargo add"
      - "cargo fetch"
      - "go get"
      - "go mod download"
      - "bundle install"
      - "gem install"
      - "composer install"
      - "composer require"
      - "mvn install"
      - "./gradlew"
      - "dotnet restore"
      - "nuget install"
      - "mix deps.get"
      - "pod install"
      - "swift package resolve"
    tags:
      - dependencies
      - packages

  - id: test-execution
    title: Test Execution
    description: Running tests across ecosystems and frameworks.
    keywords:
      - "npm test"
      - "npm run test"
      - "npx vitest"
      - "vitest run"
      - "jest --"
      - "jest run"
      - "mocha "
      - "pytest"
      - "python -m pytest"
      - "python -m unittest"
      - "cargo test"
      - "go test"
      - "go test ./..."
      - "mvn test"
      - "./gradlew test"
      - "dotnet test"
      - "swift test"
      - "rspec"
      - "bundle exec rspec"
      - "phpunit"
      - "mix test"
      - "elixir --"
      - "deno test"
      - "bun test"
    tags:
      - testing

  - id: error-recovery
    title: Error Recovery
    description: Test failures, compilation errors, and runtime panics that signal a recovery step.
    keywords:
      - "FAILED"
      - "COMPILATION ERROR"
      - "SyntaxError:"
      - "TypeError:"
      - "AssertionError"
      - "NullPointerException"
      - "panicked at"
      - "Traceback (most recent"
      - "error[E"
      - "exit code 1"
      - "Process exited with"
      - "build failed"
      - "test failed"
      - "segfault"
    tags:
      - error
      - debugging

  - id: human-in-loop
    title: Human in the Loop
    description: Agent pausing for human approval, review, or confirmation.
    lane: questions
    keywords:
      - "awaiting approval"
      - "waiting for approval"
      - "requires approval"
      - "human review"
      - "human approval"
      - "waiting for input"
      - "requires confirmation"
      - definehook
      - resumehook
      - "paused workflow"
    tags:
      - human-in-loop
      - approval
