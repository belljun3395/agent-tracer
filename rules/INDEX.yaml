version: 1
rules:
  - id: exploration
    title: Code Exploration
    description: Reading files, searching code, checking dependencies.
    lane: exploration
    prefixes:
      - docs/
      - README
    keywords:
      - read
      - search
      - grep
      - glob
      - find
      - explore
      - check
      - inspect
      - list
      - fetch
    tags:
      - exploration
      - read

  - id: planning
    title: Planning & Analysis
    description: Thinking, planning, deciding approaches before coding.
    lane: planning
    keywords:
      - plan
      - analyze
      - decide
      - approach
      - strategy
      - consider
      - review
      - assess
      - design
      - architecture
    tags:
      - planning

  - id: frontend
    title: Dashboard UI
    description: Timeline rendering, components, and browser-facing work.
    lane: implementation
    prefixes:
      - packages/web/
    keywords:
      - react
      - vite
      - dashboard
      - timeline
      - component
      - style
      - css
      - tsx
      - app.tsx
      - styles.css
    tags:
      - frontend
      - implementation
    file: frontend.md

  - id: backend
    title: Backend and API
    description: Server routes, data stores, and ingest pipelines.
    lane: implementation
    prefixes:
      - packages/server/
      - packages/core/
    keywords:
      - express
      - sqlite
      - websocket
      - api
      - database
      - service
      - endpoint
    tags:
      - backend
      - implementation
    file: backend.md

  - id: hooks
    title: Claude Hooks
    description: Hook scripts and automation configuration.
    lane: implementation
    prefixes:
      - .claude/hooks/
      - .claude/
    keywords:
      - hook
      - settings.json
      - ensure_task
      - terminal.py
      - tool_used
      - session_stop
      - explore
    tags:
      - hooks
      - automation

  - id: opencode-async
    title: OpenCode Async Lifecycle
    description: Background task launches, progress, and completion events from OpenCode workflows.
    lane: implementation
    keywords:
      - opencode
      - background
      - async
      - run_in_background
      - background_output
      - prompt_async
      - async task
      - async lifecycle
      - pending
      - completed
      - cancelled
      - interrupt
    tags:
      - opencode
      - async
      - lifecycle
      - implementation

  - id: test-build
    title: Tests & Builds
    description: Running tests, builds, lints, and quality checks.
    lane: rules
    keywords:
      - npm test
      - npm run
      - vitest
      - typecheck
      - build
      - lint
      - jest
      - mocha
      - pytest
      - git commit
      - git push
      - npm install
      - pnpm
      - tsc
    tags:
      - build
      - test
      - rules
