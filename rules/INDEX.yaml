version: 1
rules:
  - id: ui-surface
    title: Dashboard UI Surface
    description: Web dashboard components, style tokens, and timeline UI files.
    keywords:
      - "@monitor/web"
      - tasklist.tsx
      - eventinspector.tsx
      - topbar.tsx
      - timeline.tsx
      - timeline.module.css
      - lanetheme.ts
      - styles/tokens.css
      - styles/base.css
      - vite.config.ts
    tags:
      - frontend
      - ui
      - web

  - id: server-runtime
    title: Server Runtime
    description: Express app, monitor service, database, and runtime session APIs.
    keywords:
      - "@monitor/server"
      - monitor-service.ts
      - create-app.ts
      - monitor-database.ts
      - runtime-session
      - task-link
      - better-sqlite3
      - express
      - websocket
    tags:
      - backend
      - server
      - runtime

  - id: mcp-surface
    title: MCP Surface
    description: MCP package, server, and monitor MCP tool names.
    keywords:
      - "@monitor/mcp"
      - modelcontextprotocol
      - monitor_task_link
      - monitor_user_message
      - monitor_session_end
      - monitor_agent_activity
      - mcp server
    tags:
      - mcp
      - coordination

  - id: claude-runtime
    title: Claude Runtime
    description: Claude hook scripts, settings, and runtime-specific integration paths.
    keywords:
      - claude-hook
      - userpromptsubmit
      - .claude/hooks/
      - user_prompt.ts
      - ensure_task.ts
      - session_end.ts
      - agent_activity.ts
      - .claude/settings.json
    tags:
      - claude
      - hooks
      - runtime

  - id: codex-runtime
    title: Codex Runtime
    description: Codex skill-based integration paths and native discovery files.
    keywords:
      - codex-skill
      - codex-monitor
      - .agents/skills/
      - agents.md
      - /codex/
    tags:
      - codex
      - runtime
      - skills

  - id: opencode-runtime
    title: OpenCode Runtime
    description: OpenCode plugin/runtime integration and Oh My Opencode envelopes.
    keywords:
      - opencode-plugin
      - opencode-sse
      - .opencode/plugins/monitor.ts
      - chat.message
      - tool.execute.after
      - session.created
      - session.deleted
      - oh-my-opencode
    tags:
      - opencode
      - runtime
      - plugin

  - id: background-lifecycle
    title: Background Lifecycle
    description: Runtime-specific background task lifecycle markers and tool names.
    lane: background
    keywords:
      - run_in_background
      - background_output
      - prompt_async
      - async_task_
      - asyncstatus
      - asynctaskid
    tags:
      - background
      - async
      - lifecycle

  - id: coordination-surface
    title: Coordination Surface
    description: Skill use, MCP calls, delegation, handoff, and task-link activity.
    lane: coordination
    keywords:
      - monitor_task_link
      - monitor_agent_activity
      - codex-monitor
      - delegation
      - handoff
      - subagent
      - skill_use
      - monitor-server
    tags:
      - coordination
      - orchestration
