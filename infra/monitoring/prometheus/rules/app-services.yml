groups:
  - name: app-services
    rules:
      - alert: EventLoopUtilizationHigh
        expr: nodejs_eventloop_utilization > 0.9
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "{{ $labels.service }} 이벤트루프 사용률 90% 초과"

      # http_server_duration 단위는 ms(구 stable semconv)다. 초 환산 없이 그대로 비교한다.
      - alert: HttpServerErrorRateHigh
        expr: |
          sum by (service) (rate(http_server_duration_count{http_status_code=~"5.."}[5m]))
          /
          sum by (service) (rate(http_server_duration_count[5m])) > 0.05
        for: 5m
        labels: { severity: critical }
        annotations:
          summary: "{{ $labels.service }} 5xx 비율 5% 초과"

      - alert: TemporalActivityScheduleToStartHigh
        expr: histogram_quantile(0.95, sum by (le) (rate(temporal_activity_schedule_to_start_latency_bucket[5m]))) > 5
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Temporal 액티비티 schedule-to-start p95 > 5s (워커 포화 가능)"

      - alert: TemporalRequestFailureRateHigh
        expr: sum(rate(temporal_request_failure{status_code!="ALREADY_EXISTS"}[10m])) > 0
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "Temporal 서버 요청 실패 발생(ALREADY_EXISTS 제외)"
