receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 5s
    limit_mib: 400
    spike_limit_mib: 100
  batch: {}

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  # projector가 tee한 이벤트 log record(span이 아닌 kind)를 받는다.
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true
  # 앱(Node)은 Prometheus 익스포터로 직접 노출하고 agents(Python)는 이 파이프라인을 탄다.
  # 접미사를 붙이면 같은 계기가 파이프라인마다 다른 이름(_seconds 유무)으로 나와 한 패널에서 못 합친다.
  prometheus/app:
    endpoint: 0.0.0.0:9465
    translation_strategy: UnderscoreEscapingWithoutSuffixes

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus/app]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/loki]
