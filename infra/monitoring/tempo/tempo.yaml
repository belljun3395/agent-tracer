server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 48h

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

# 트레이스에서 서비스 그래프와 RED 메트릭을 자동 생성해 Prometheus로 흘려보내며, CDC를 넘어가는
# 구간(runtime-api -> projector)은 트레이스 컨텍스트가 끊겨 조각난 그래프로 보이므로 그 구간의
# 지연과 유실은 pipeline_* 커스텀 메트릭이 대신 담당한다.
metrics_generator:
  # CDC·로컬 spool의 정상적인 지연은 수용하되 장기 backfill이 현재 RED를 왜곡하지 않게 제한한다.
  metrics_ingestion_time_range_slack: 30m
  processor:
    span_metrics:
      # 식별자 대신 운영상 유한한 차원만 RED 메트릭에 추가한다.
      dimensions:
        - gen_ai.operation.name
        - gen_ai.provider.name
        - agent_tracer.runtime.source
        - agent_tracer.lane
        - agent_tracer.evidence_level
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
