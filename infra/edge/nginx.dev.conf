worker_processes 1;
events { worker_connections 1024; }
http {
  server {
    listen 3847;
    client_max_body_size 5m;

    # 개발 모드의 앱은 컨테이너가 아니라 호스트에서 돌므로 도커 내장 DNS가 아니라
    # host-gateway 항목으로 찾는다. resolver를 쓰면 /etc/hosts를 보지 않아 이 항목을 놓친다.
    location /ingest/ { proxy_pass http://host.docker.internal:3901; }

    location /ws {
      proxy_pass http://host.docker.internal:3902;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 3600s;
    }

    location / { proxy_pass http://host.docker.internal:3902; }   # /api/*, /health
  }
}
