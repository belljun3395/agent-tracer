worker_processes 1;
events { worker_connections 1024; }
http {
  # Docker 내장 DNS. 변수로 넘긴 proxy_pass는 이 resolver의 TTL마다 재해석되어
  # runtime-api/tracer-api 컨테이너 재생성으로 내부 IP가 바뀌어도 캐시가 고이지 않는다.
  resolver 127.0.0.11 valid=10s;

  server {
    listen 3847;
    client_max_body_size 5m;

    set $runtime_api http://runtime-api:3901;
    set $tracer_api  http://tracer-api:3902;

    location /ingest/ { proxy_pass $runtime_api; }

    location /ws {
      proxy_pass $tracer_api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 3600s;
    }

    location / { proxy_pass $tracer_api; }   # /api/*, /health
  }
}
