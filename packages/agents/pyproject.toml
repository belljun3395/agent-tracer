[project]
name = "agent-graph"
version = "0.1.0"
description = "LangGraph 기반 AI 잡 에이전트 3종(recipe-scan·title-suggestion·task-cleanup)의 실행 서비스"
requires-python = ">=3.12"
dependencies = [
    "langgraph>=1.0",
    "langchain-core>=1.0",
    "langchain-anthropic>=1.0",
    "anthropic>=0.42.0",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "pydantic>=2.9.0",
    "pydantic-settings>=2.6.0",
    "httpx>=0.27.0",
    "asyncpg>=0.30.0",
    "opensearch-py[async]>=2.8.0",
    "opentelemetry-api>=1.38.0",
    "opentelemetry-sdk>=1.38.0",
    "opentelemetry-exporter-otlp-proto-http>=1.38.0",
    "opentelemetry-instrumentation-system-metrics>=0.59b0",
    "langsmith>=0.9.8",
    "langchain>=1.3.12",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.8.0",
    "mypy>=1.13.0",
    "asyncpg-stubs>=0.30.0",
    "grandalf>=0.8",
]

[project.scripts]
agent-graph = "agent_graph.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_graph"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 110
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "A", "SLF", "ARG", "SIM", "C4", "PIE", "PERF", "RET", "RUF"]

[tool.ruff.lint.per-file-ignores]
# 테스트는 캔 데이터 한 줄 표현을 위해 긴 줄을 허용한다.
"tests/*" = ["E501"]

[tool.mypy]
python_version = "3.12"
packages = ["agent_graph"]
mypy_path = "src"
strict = true
