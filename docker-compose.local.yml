# stack:up:local 전용 오버라이드다. 배포 이미지 그대로 띄우되 AI 잡을 Claude SDK 백엔드로
# 돌리고, API 키 대신 호스트에서 발급한 구독 토큰(CLAUDE_CODE_OAUTH_TOKEN)으로 실행한다.
#
#   claude setup-token                     # 구독 로그인된 기계에서 토큰 발급
#   export CLAUDE_CODE_OAUTH_TOKEN=<토큰>
#   npm run stack:up:local
services:
  # 잡을 접수·스탬프하는 쪽이 tracer-api라 프로파일과 백엔드를 워커와 같게 맞춰야 키 검사가 열린다.
  tracer-api:
    environment:
      MONITOR_PROFILE: local
      AGENT_BACKEND: claude-sdk
  ai-agent-worker:
    environment:
      MONITOR_PROFILE: local
      AGENT_BACKEND: claude-sdk
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:?claude setup-token 값을 CLAUDE_CODE_OAUTH_TOKEN env로 넘겨야 한다}
