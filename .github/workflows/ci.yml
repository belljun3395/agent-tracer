name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - uses: astral-sh/setup-uv@v8
        with:
          version: "0.10.2"
          enable-cache: true
          cache-dependency-glob: packages/agents/uv.lock

      - run: npm ci

      - name: Python 개발 환경
        working-directory: packages/agents
        run: uv sync --frozen --extra dev

      - name: 별칭 신선도
        run: npm run check:paths

      - name: 린트
        run: npm run lint

      - name: 테스트
        run: npm run test

      - name: Python 품질 검사
        working-directory: packages/agents
        run: |
          .venv/bin/ruff check src tests scripts
          .venv/bin/mypy src scripts
          .venv/bin/python scripts/check_comments.py src tests scripts
          .venv/bin/python scripts/check_internal_dependencies.py src

      - name: 의존 그래프
        run: npm run lint:deps

  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - uses: docker/setup-buildx-action@v3

      - name: 이미지 빌드와 내용 검사
        run: npm run check:images

  history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: 커밋 범위 결정
        id: range
        run: |
          set -euo pipefail
          # force-push은 이전 tip을 버리므로 그 커밋이 아직 있는지 확인하고 없으면 새 커밋만 본다.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "value=${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          elif git cat-file -e "${{ github.event.before }}^{commit}" 2>/dev/null; then
            echo "value=${{ github.event.before }}..${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=HEAD~1..HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: 커밋 메시지
        run: |
          set -euo pipefail
          # 범위가 성립하지 않으면 조용히 0건을 검사하고 통과하므로 먼저 목록을 세운다.
          shas=$(git log "${{ steps.range.outputs.value }}" --format=%H)
          failed=0
          for sha in $shas; do
            git log -1 --format=%B "$sha" > "$RUNNER_TEMP/msg"
            node scripts/check-commit-msg.mjs "$RUNNER_TEMP/msg" || failed=1
          done
          exit $failed

      - name: 공동 작성자
        run: node scripts/check-coauthors.mjs --range "${{ steps.range.outputs.value }}"
