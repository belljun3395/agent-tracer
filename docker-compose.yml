services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "3847:3847"
    volumes:
      - monitor-data:/app/.monitor
    environment:
      - NODE_ENV=production
      # Bind all interfaces inside the container so the published port is
      # reachable from the host (the app defaults to loopback-only).
      - MONITOR_LISTEN_HOST=0.0.0.0

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  monitor-data:
