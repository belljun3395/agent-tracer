x-app-env: &app-env
  NODE_ENV: production
  MONITOR_PROFILE: prd
  MONITOR_SETTINGS_ENCRYPTION_KEY: ${MONITOR_SETTINGS_ENCRYPTION_KEY:-monitor-dev-key}
  MONITOR_LISTEN_HOST: 0.0.0.0
  RUNTIME_DB_HOST: runtime-db
  RUNTIME_DB_PORT: "5432"
  TRACER_DB_HOST: tracer-db
  TRACER_DB_PORT: "5432"
  POSTGRES_USER: ${POSTGRES_USER:-monitor}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monitor}
  KAFKA_BROKERS: redpanda:29092
  OPENSEARCH_NODE: http://opensearch:9200
  TEMPORAL_ADDRESS: temporal:7233
  # python(기본) 또는 claude-sdk이며 API와 ai-agent-worker가 같은 기본값을 써야 한다.
  AGENT_BACKEND: ${AGENT_BACKEND:-python}

services:
  # ---- 데이터 저장소 ----
  runtime-db:
    build: { context: ., dockerfile: infra/runtime-db/Dockerfile }
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-monitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monitor}
      POSTGRES_DB: runtime
    command: ["postgres", "-c", "wal_level=logical"]
    ports: ["5432:5432"]
    volumes: [runtime-db-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monitor} -d runtime"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
      start_interval: 1s

  tracer-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-monitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monitor}
      POSTGRES_DB: tracer
    ports: ["5433:5432"]
    volumes: [tracer-db-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monitor} -d tracer"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
      start_interval: 1s

  # ---- 이벤트 브로커 ----
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    command:
      - redpanda start --smp 1 --overprovisioned --node-id 0
        --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
        --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:19092
    ports: ["19092:9092"]
    volumes: [redpanda-data:/var/lib/redpanda/data]
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health --exit-when-healthy"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
      start_interval: 1s

  redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    depends_on:
      redpanda: { condition: service_healthy }
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        rpk topic create ingest.events -p 6 -r 1 --brokers redpanda:29092 || true
        rpk topic create notifications -p 3 -r 1 --brokers redpanda:29092 || true

  connect:
    image: debezium/connect:2.7.3.Final
    depends_on:
      redpanda: { condition: service_healthy }
      runtime-db: { condition: service_healthy }
    environment:
      BOOTSTRAP_SERVERS: redpanda:29092
      GROUP_ID: connect-cluster
      CONFIG_STORAGE_TOPIC: _connect_configs
      OFFSET_STORAGE_TOPIC: _connect_offsets
      STATUS_STORAGE_TOPIC: _connect_status
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    ports: ["8083:8083"]

  connect-init:
    # 커넥터 등록을 재시도로 자가회복하며 앱 이미지 없이도 인프라만으로 기동할 수 있다.
    image: curlimages/curl:8.10.1
    depends_on:
      connect: { condition: service_started }
    volumes: [./infra/debezium/runtime-ledger.json:/runtime-ledger.json:ro]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until curl -sf http://connect:8083/connectors >/dev/null; do sleep 2; done
        until curl -sf -X PUT http://connect:8083/connectors/runtime-ledger/config \
          -H 'Content-Type: application/json' -d @/runtime-ledger.json >/dev/null; do sleep 2; done
        while :; do
          s=$$(curl -s http://connect:8083/connectors/runtime-ledger/status || true)
          case "$$(printf '%s' "$$s" | grep -o '"tasks":\[[^]]*')" in
            *'"state":"RUNNING"'*) break ;;
          esac
          case "$$s" in *'"state":"FAILED"'*)
            curl -s -X POST "http://connect:8083/connectors/runtime-ledger/restart?includeTasks=true&onlyFailed=true" >/dev/null || true ;;
          esac
          sleep 3
        done
        echo "runtime-ledger connector RUNNING"

  opensearch:
    image: opensearchproject/opensearch:2.17.1
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: Monitor!Local1
    ports: ["9200:9200"]
    volumes: [opensearch-data:/usr/share/opensearch/data]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
      start_interval: 2s

  # ---- Temporal ----
  temporal-postgres:
    image: postgres:17-alpine
    environment: { POSTGRES_USER: temporal, POSTGRES_PASSWORD: temporal }
    volumes: [temporal-postgres-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
      start_interval: 1s

  temporal:
    image: temporalio/auto-setup:1.25.2
    depends_on:
      temporal-postgres: { condition: service_healthy }
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgres
    ports: ["7233:7233"]

  temporal-ui:
    image: temporalio/ui:2.31.2
    depends_on: [temporal]
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8233
    ports: ["8233:8080"]

  # ---- 애플리케이션 ----
  # 마이그레이션이 끝나야 앱이 뜨는 원샷 컨테이너이며, 앱 4종은 검사만 하고 마이그레이션을 직접 실행하지 않는다.
  migrate:
    build: { context: ., dockerfile: Dockerfile, target: migrate }
    environment: *app-env
    restart: "no"
    depends_on:
      runtime-db: { condition: service_healthy }
      tracer-db: { condition: service_healthy }

  runtime-api:
    build: { context: ., dockerfile: Dockerfile, target: runtime-api }
    environment: *app-env
    depends_on:
      runtime-db: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3901/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 90s
      start_interval: 1s

  tracer-api:
    build: { context: ., dockerfile: Dockerfile, target: tracer-api }
    environment: *app-env
    depends_on:
      tracer-db: { condition: service_healthy }
      redpanda: { condition: service_healthy }
      opensearch: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }

  projector:
    build: { context: ., dockerfile: Dockerfile, target: projector }
    environment: *app-env
    depends_on:
      tracer-db: { condition: service_healthy }
      redpanda: { condition: service_healthy }
      opensearch: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }

  # AI 잡 에이전트 3종을 Python으로 실행하는 무상태 실행 백엔드이며 ai-agent-worker가 HTTP로 호출한다.
  agents:
    build: { context: ./packages/agents }
    environment:
      AGENT_GRAPH_HOST: 0.0.0.0
      AGENT_GRAPH_PORT: "8800"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8800/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
      start_interval: 1s

  ai-agent-worker:
    build: { context: ., dockerfile: Dockerfile, target: ai-agent-worker }
    environment:
      <<: *app-env
      AGENT_GRAPH_URL: http://agents:8800
      AGENT_TOOL_CALLBACK_PORT: "8810"
      AGENT_TOOL_CALLBACK_URL: http://ai-agent-worker:8810
    depends_on:
      tracer-db: { condition: service_healthy }
      temporal: { condition: service_started }
      redpanda: { condition: service_healthy }
      agents: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }

  edge:
    image: nginx:1.27-alpine
    volumes: [./infra/edge/nginx.conf:/etc/nginx/nginx.conf:ro]
    ports: ["127.0.0.1:3847:3847"]
    depends_on: [runtime-api, tracer-api]

  web:
    build: { context: ., dockerfile: Dockerfile, target: web }
    ports: ["127.0.0.1:5173:80"]
    depends_on: [edge]

volumes:
  runtime-db-data:
  tracer-db-data:
  redpanda-data:
  opensearch-data:
  temporal-postgres-data:
