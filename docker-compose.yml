name: agent-tracer-bench

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "3847:3847"   # API
      - "9464:9464"   # OTel Prometheus exporter (/metrics)
    volumes:
      - monitor-data:/app/.monitor
    environment:
      - NODE_ENV=production
      - OTEL_SERVICE_NAME=agent-tracer-server
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=benchmark
      # Opt in to the stable HTTP semantic conventions
      # (http.server.request.duration in seconds) so the dashboard PromQL
      # against `http_server_request_duration_*` resolves.
      - OTEL_SEMCONV_STABILITY_OPT_IN=http
    # Pin resource budget so AS-IS / TO-BE benchmarks compare apples to apples.
    # See docs/guide/performance-plan.md §3.5.
    cpus: 1.0
    mem_limit: 512m
    mem_reservation: 256m

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "5173:80"
    depends_on:
      - server

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - server

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_USERS_DEFAULT_THEME=light
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  # Run on demand:
  #   docker compose --profile bench run --rm k6
  k6:
    image: grafana/k6:0.54.0
    profiles: ["bench"]
    volumes:
      - ./observability/k6:/scripts:ro
    environment:
      - MONITOR_BASE_URL=http://server:3847
      - K6_DURATION=2m
      - K6_RPS=200
      - K6_BATCH_SIZE=5
    command: run /scripts/ingest-events.js
    depends_on:
      - server

volumes:
  monitor-data:
  prometheus-data:
  grafana-data:
