services:
  # ---- 인프라 (NestJS + Postgres + Redis 만 사용) ----
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-monitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monitor}
      POSTGRES_DB: ${POSTGRES_DB:-monitor}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monitor} -d ${POSTGRES_DB:-monitor}"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  # ---- Temporal 로컬 스택 (profile: temporal) ----
  # business Postgres와 분리된 Temporal 전용 코디네이션 DB.
  temporal-postgres:
    image: postgres:17-alpine
    profiles: ["temporal"]
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - temporal-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 12

  temporal:
    image: temporalio/auto-setup:1.25.2
    profiles: ["temporal"]
    depends_on:
      temporal-postgres:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgres
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.31.2
    profiles: ["temporal"]
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8233
    ports:
      - "8233:8080"

  # ---- 애플리케이션 ----
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: gateway
    ports:
      - "3847:3847"
    environment:
      - NODE_ENV=production
      - MONITOR_PROFILE=prd
      # 컨테이너 안에서 모든 인터페이스 바인딩(앱 기본은 loopback).
      - MONITOR_LISTEN_HOST=0.0.0.0
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-monitor}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-monitor}
      - POSTGRES_DB=${POSTGRES_DB:-monitor}
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  postgres-data:
  temporal-postgres-data:
